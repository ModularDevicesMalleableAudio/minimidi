name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --release

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
        experimental: [false]
        include:
          # Advance warning if a future Python breaks PyO3 abi3; never
          # blocks the build.
          - python-version: "3.15"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v6
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --all-groups --python ${{ matrix.python-version }}
      - run: uv run maturin develop --release
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy
      - run: uv run pytest tests -x

  # No integration job: GitHub's hosted runners use Azure kernels whose
  # linux-modules-extra package does not ship sound modules (snd-virmidi),
  # so the VirMIDI round-trip can never run here. Integration tests run
  # locally / on real hardware via scripts/test.sh with snd-virmidi loaded.
